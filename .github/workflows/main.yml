# .github/workflows/main.yml (Updated with Docker Build)
name: Weather ML Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:

      # Step 1 — Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2 — Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10

      # Step 3 — Install dependencies
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4 — Check trained model exists
      - name: Check Model File
        run: |
          test -f model/rain_prediction.pkl

      # Step 5 — Test FastAPI backend import
      - name: Test Backend
        run: |
          python -c "from backend.app import app; print('Backend Working Successfully')"

      # Step 6 — Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t weather-mlops-app .

      # Step 7 — Final success message
      - name: Pipeline Success
        run: |
          echo "CI + Docker Build Pipeline Passed Successfully"

